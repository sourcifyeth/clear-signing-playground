name: Release on Google Bucket

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: "google-github-actions/auth@v2"
        with:
          workload_identity_provider: "projects/1019539084286/locations/global/workloadIdentityPools/github/providers/sourcify"
          service_account: "clear-signing-playground-cd@sourcify-project.iam.gserviceaccount.com"

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "22.4.0"

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Setup gcloud
        uses: "google-github-actions/setup-gcloud@v2"

      - name: Clear bucket
        run: gsutil -m rm gs://clear-signing-playground/** || true

      - name: Upload files to bucket
        uses: google-github-actions/upload-cloud-storage@v2
        with:
          path: "dist"
          destination: "clear-signing-playground"
          parent: false
          glob: "**/*"
